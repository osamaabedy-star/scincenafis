<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>نافس سادس • علوم • تصنيفات موضوعية</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Tahoma', 'Arial', sans-serif;
    }

    body {
      background: linear-gradient(145deg, #13678e 0%, #0a4b6b 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .game-container {
      width: 100%;
      max-width: 750px;
      background: #ffffff;
      border-radius: 40px 40px 25px 25px;
      box-shadow: 0 20px 30px rgba(0,0,0,0.4), 0 8px 10px rgba(0,0,0,0.2);
      border: 1px solid #f3b33d;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #fbe39f;
      padding: 8px 20px;
      border-bottom: 2px solid #d49b2a;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .logo-area img {
      width: 42px;
      height: auto;
      border-radius: 30px;
      border: 2px solid #b8861e;
      background: white;
    }

    .school-name {
      font-size: 1rem;
      font-weight: 700;
      color: #1d4c65;
    }

    /* تصغير اسم المعلم */
    .teacher-name {
      background: #1e4e6f;
      color: #fbe39f;
      padding: 3px 12px;  /* تقليل الحشو */
      border-radius: 30px;
      font-size: 0.8rem;   /* تصغير الخط */
      font-weight: 600;
      box-shadow: inset 0 -2px 0 #0e3142;
      white-space: nowrap;
    }

    .screen {
      background: #fefcf0;
      padding: 20px 20px 25px;
    }

    .title-box {
      background: #f5b62e;
      text-align: center;
      padding: 10px 5px;
      border-radius: 50px;
      font-size: 2rem;
      font-weight: 800;
      color: #1f3f50;
      margin: 0 0 15px;
      letter-spacing: 1px;
      box-shadow: 0 4px 0 #b87d19;
    }

    .input-group {
      background: #e3f0f5;
      padding: 18px;
      border-radius: 35px;
      margin: 15px 0;
    }
    .input-group label {
      font-size: 1.2rem;
      font-weight: 600;
      display: block;
      margin-right: 10px;
      margin-bottom: 5px;
      color: #0e4760;
    }
    .input-group input {
      width: 100%;
      padding: 12px 20px;
      font-size: 1.2rem;
      border: 2px solid #2f789c;
      border-radius: 50px;
      outline: none;
    }

    .test-selection {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }

    .test-btn {
      border: none;
      color: white;
      font-size: 1.2rem;
      font-weight: 700;
      padding: 16px 5px;
      border-radius: 60px;
      box-shadow: 0 7px 0 rgba(0,0,0,0.3);
      cursor: pointer;
      transition: 0.07s;
      text-align: center;
    }
    .test-btn:active { transform: translateY(5px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
    .test-btn:nth-child(1) { background: #2e86ab; }
    .test-btn:nth-child(2) { background: #e67e22; }
    .test-btn:nth-child(3) { background: #27ae60; }
    .test-btn:nth-child(4) { background: #8e44ad; }

    .quiz-screen {
      background: #fefcf0;
      padding: 15px 18px 20px;
      display: none;
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      background: #fce5a3;
      padding: 6px 18px;
      border-radius: 40px;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .timer {
      background: #c0392b;
      color: white;
      padding: 2px 22px;
      border-radius: 40px;
      font-family: monospace;
      font-size: 1.6rem;
    }

    .score-badge {
      background: #206f94;
      color: white;
      padding: 6px 20px;
      border-radius: 40px;
      font-size: 1.3rem;
      font-weight: 700;
      display: inline-block;
      margin-bottom: 10px;
    }

    .question-text {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.4;
      text-align: center;
      color: #124257;
      padding: 10px 0 15px;
      background: transparent;
      border: none;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 10px 0 15px;
    }

    .option-btn {
      background: #d4e7f2;
      border: 2px solid #1e4e6f;
      border-radius: 40px;
      padding: 15px 5px;
      font-size: 1.2rem;
      font-weight: 600;
      text-align: center;
      color: #0c3d53;
      cursor: pointer;
      box-shadow: 0 4px 0 #638ea6;
      transition: 0.07s;
    }
    .option-btn:active { transform: translateY(4px); box-shadow: 0 0px 0 #638ea6; }

    .option-btn.correct { background: #27ae60; border-color: #1e7e4a; color: white; box-shadow: 0 4px 0 #1a5e38; }
    .option-btn.wrong { background: #e74c3c; border-color: #a93226; color: white; box-shadow: 0 4px 0 #852f26; }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #fef9e0;
      border-radius: 50px;
      padding: 25px 30px;
      max-width: 400px;
      text-align: center;
      border: 6px solid #f39c12;
      box-shadow: 0 15px 25px #00000055;
    }
    .modal-content p {
      font-size: 1.5rem;
      color: #1d3b4b;
      margin: 10px 0;
    }
    .modal-content button {
      background: #f4a261;
      border: none;
      font-size: 1.5rem;
      padding: 10px 35px;
      border-radius: 40px;
      font-weight: bold;
      color: white;
      box-shadow: 0 5px 0 #9c5e2c;
      cursor: pointer;
      margin-top: 15px;
    }
    .modal-content button:active { transform: translateY(4px); box-shadow: 0 1px 0 #9c5e2c; }

    .btn {
      background: #f4a261;
      border: none;
      color: white;
      font-size: 1.8rem;
      font-weight: 700;
      padding: 12px 20px;
      border-radius: 60px;
      width: 100%;
      box-shadow: 0 7px 0 #9c5e2c;
      cursor: pointer;
      margin: 10px 0;
    }
    .btn:active { transform: translateY(5px); box-shadow: 0 2px 0 #9c5e2c; }

    .certificate {
      background: #fbf3d7;
      border: 8px double #ca9e2b;
      padding: 20px;
      border-radius: 60px;
      text-align: center;
    }
    .review-table {
      width: 100%;
      border-collapse: collapse;
      background: #ebf3f7;
      border-radius: 30px;
      overflow: hidden;
      font-size: 0.9rem;
    }
    .review-table th { background: #1e4e6f; color: white; padding: 8px; }
    .review-table td { border-bottom: 1px solid #aaa; padding: 8px 4px; }
    .wrong-answer { background: #fad1d1; }
    .correct-answer { background: #c8e6c9; }

    .game-footer {
      text-align: center;
      padding: 8px 0 2px;
      color: #ffe8b5;
      font-size: 1rem;
      width: 100%;
      max-width: 750px;
    }
    .game-footer span { background: #0a2f40b3; padding: 5px 18px; border-radius: 40px; display: inline-block; }
  </style>
</head>
<body>
<div class="game-container">
  <!-- شاشة البداية -->
  <div id="startScreen" class="screen">
    <div class="header">
      <div class="logo-area">
        <img src="https://www.wzufa.com/wp-content/uploads/2022/07/Riyadh-Al-Ebdaa-Schools.png" alt="شعار" onerror="this.src='https://via.placeholder.com/42?text=شعار'">
        <span class="school-name">مدارس رياض الإبداع الأهلية</span>
      </div>
      <div class="teacher-name">هـشـام الـشـونـي</div>
    </div>
    <div class="title-box">🧪 نافس سادس - تصنيفات</div>
    <div class="input-group">
      <label>👤 اسم الطالب</label>
      <input type="text" id="studentNameInput" placeholder="أدخل اسمك" value=" ">
    </div>
    <div style="text-align:center; margin:10px 0; font-size:1.3rem; font-weight:bold;">اختر التصنيف:</div>
    <div class="test-selection">
      <button class="test-btn" id="topicEarthBtn">🌍 علوم الأرض والفضاء</button>
      <button class="test-btn" id="topicPhysicsBtn">⚡ فيزياء وكيمياء</button>
      <button class="test-btn" id="topicBiologyBtn">🧬 علوم الحياة (أحياء)</button>
      <button class="test-btn" id="topicEnvBtn">🌱 البيئة والصحة</button>
    </div>
  </div>

  <!-- شاشة اللعب -->
  <div id="quizScreen" class="quiz-screen">
    <div class="header">
      <div class="logo-area">
        <img src="https://www.wzufa.com/wp-content/uploads/2022/07/Riyadh-Al-Ebdaa-Schools.png" alt="شعار">
        <span class="school-name">رياض الإبداع</span>
      </div>
      <div class="teacher-name">هشام الشوني</div>
    </div>
    <div class="progress-row">
      <span id="questionCounter">س ١ / ٢٥</span>
      <span class="timer" id="timerDisplay">٠١:٠٠</span>
    </div>
    <div class="score-badge" id="scoreDisplay">🏆 ٠ نقطة</div>
    <div id="questionText" class="question-text">تحميل ...</div>
    <div class="options-grid" id="optionsContainer"></div>
    <button class="btn" id="nextBtn">⏩ التالي</button>
  </div>

  <!-- شاشة النهاية -->
  <div id="endScreen" class="screen" style="display:none;">
    <div class="header">
      <div class="logo-area">
        <img src="https://www.wzufa.com/wp-content/uploads/2022/07/Riyadh-Al-Ebdaa-Schools.png" alt="شعار">
        <span class="school-name">مدارس رياض الإبداع الأهلية</span>
      </div>
      <div class="teacher-name">هشام الشوني</div>
    </div>
    <div id="certificateArea"></div>
    <button class="btn" id="showReviewBtn" style="background:#3684a3;">📋 مراجعة الإجابات</button>
    <button class="btn" id="restartBtn" style="background:#b56532;">🔁 العودة للرئيسية</button>
  </div>

  <!-- شاشة المراجعة -->
  <div id="reviewScreen" class="screen" style="display:none;">
    <h2 style="color:#1e4e6f;">📋 جميع الأسئلة</h2>
    <table class="review-table" id="reviewTable"></table>
    <button class="btn" id="backToEndBtn">🔙 العودة</button>
  </div>
</div>

<!-- النافذة المنبثقة للشرح (تظهر فقط عند الخطأ) -->
<div id="explainModal" class="modal-overlay">
  <div class="modal-content">
    <p id="modalExplainText"></p>
    <button id="closeModalBtn">حسناً</button>
  </div>
</div>

<!-- تذييل -->
<div class="game-footer">
  <span>مدارس رياض الإبداع الأهلية - نافس سادس ابتدائي - :  </span>
</div>

<script>
  (function(){
    // ---------- تصنيفات الأسئلة (موضوعية) ----------
    const topics = {
      earth: [   // علوم الأرض والفضاء
        { q: "ما يميز الصخور المتكونة ببطء شديد في الأعماق؟", opts: ["صغيرة الحبيبات", "خشنة الحبيبات", "ناعمة الملمس", "زجاجية الملمس"], correct: 1, exp: "الصخور التي تبرد ببطء في الأعماق تسمح بنمو بلورات كبيرة، فتكون خشنة الحبيبات." },
        { q: "يوصف البركان بأنه بركان ساكن عندما:", opts: ["تندفع اللابة بهدوء", "تندفع الغازات فقط", "توقف عن الثوران وقد يثور مجدداً", "اندثر نهائياً"], correct: 2, exp: "البركان الساكن هو الذي توقف عن الثوران لكنه قد ينشط مجدداً مستقبلاً." },
        { q: "يرتبط تكون خزانات المياه الجوفية بـ:", opts: ["الصخور المتحولة", "البلورات", "الصخور النارية", "الصخور الرسوبية المسامية"], correct: 3, exp: "المياه الجوفية تتجمع في الصخور المسامية مثل الحجر الرملي." },
        { q: "أي أنواع الصخور يحتوي على أحافير؟", opts: ["النارية", "المتحولة", "الرسوبية", "البركانية"], correct: 2, exp: "الأحافير توجد في الصخور الرسوبية." },
        { q: "ما الذي يسبب المد والجزر؟", opts: ["الرياح", "جاذبية القمر", "دوران الأرض", "الزلازل"], correct: 1, exp: "جاذبية القمر والشمس تسبب المد والجزر." },
        { q: "أي الكواكب له حلقات واضحة؟", opts: ["المريخ", "الزهرة", "زحل", "عطارد"], correct: 2, exp: "زحل يتميز بحلقاته الجميلة." },
        { q: "ماذا نسمي صخوراً تتكون من تصلب الصهارة؟", opts: ["رسوبية", "نارية", "متحولة", "معدنية"], correct: 1, exp: "الصخور النارية تنتج من تبريد الصهارة." },
        { q: "ما أكبر نظام بيئي على الأرض؟", opts: ["الغابة", "المحيط", "الصحراء", "الغلاف الحيوي"], correct: 3, exp: "الغلاف الحيوي يشمل جميع النظم البيئية." },
        { q: "ماذا تسمى الطبقة الصلبة للأرض؟", opts: ["اللب", "الستار", "القشرة", "الغلاف المائي"], correct: 2, exp: "القشرة الأرضية هي الطبقة الصلبة الخارجية." },
        { q: "ما الذي ينتج عن دوران الأرض حول الشمس؟", opts: ["الليل والنهار", "الفصول الأربعة", "المد والجزر", "الخسوف"], correct: 1, exp: "دوران الأرض حول الشمس يسبب الفصول." },
        { q: "أي أنواع الجبال يتكون بفعل الضغط؟", opts: ["البركانية", "الملوية", "المتصدعة", "المحدبة"], correct: 1, exp: "الجبال الملوية تنشأ من ضغط الطبقات." },
        { q: "ما مصدر الطاقة الرئيسي على الأرض؟", opts: ["الرياح", "الماء", "الشمس", "الوقود"], correct: 2, exp: "الشمس المصدر الأساسي للطاقة." },
        { q: "كم عدد الكواكب في المجموعة الشمسية؟", opts: ["٧", "٨", "٩", "١٠"], correct: 1, exp: "عدد الكواكب 8 بعد استبعاد بلوتو." },
        { q: "ماذا تسمى الصخور المنصهرة في باطن الأرض؟", opts: ["الحمم", "الصهارة", "اللافا", "الرماد"], correct: 1, exp: "الصهارة (magma) تحت الأرض، واللافا فوقها." },
        { q: "أي طبقات الغلاف الجوي تحتوي على الأوزون؟", opts: ["التروبوسفير", "الستراتوسفير", "الميزوسفير", "الثرموسفير"], correct: 1, exp: "طبقة الستراتوسفير تحتوي على الأوزون." },
        { q: "ما هو أكبر محيط على الأرض؟", opts: ["الأطلسي", "الهندي", "الهادئ", "المتجمد"], correct: 2, exp: "المحيط الهادئ هو الأكبر." },
        { q: "سبب حدوث الزلازل:", opts: ["الرياح", "حركة الصفائح الأرضية", "الأمواج", "البراكين فقط"], correct: 1, exp: "الزلازل تحدث بسبب حركة الصفائح التكتونية." },
        { q: "أي المعادن التالية أقسى؟", opts: ["التلك", "الجبس", "الكوارتز", "الماس"], correct: 3, exp: "الماس هو أقسى المعادن." },
        { q: "ما هو الكوكب الأحمر؟", opts: ["الزهرة", "المريخ", "المشتري", "عطارد"], correct: 1, exp: "المريخ يسمى بالكوكب الأحمر." },
        { q: "الصخور التي تتكون من تفتت صخور أخرى:", opts: ["النارية", "المتحولة", "الرسوبية الفتاتية", "الكيميائية"], correct: 2, exp: "الرسوبية الفتاتية مثل الحجر الرملي." },
        { q: "أكبر كوكب في المجموعة الشمسية:", opts: ["زحل", "المشتري", "نبتون", "أورانوس"], correct: 1, exp: "المشتري هو الأكبر." },
        { q: "ما الذي يسبب ظاهرة الشفق القطبي؟", opts: ["الرياح", "الغبار", "الجسيمات المشحونة", "الغيوم"], correct: 2, exp: "تفاعل الجسيمات المشحونة مع الغلاف الجوي." },
        { q: "أي مما يلي ليس من أنواع الصخور؟", opts: ["النارية", "الرسوبية", "المتحولة", "البركانية"], correct: 3, exp: "البركانية وصف للصخور النارية البركانية." },
        { q: "ما هو أثقل المعادن؟", opts: ["الحديد", "الرصاص", "الأوزميوم", "الزئبق"], correct: 2, exp: "الأوزميوم من أثقل العناصر." },
        { q: "كم يبلغ عدد ألوان قوس المطر؟", opts: ["٥", "٦", "٧", "٨"], correct: 2, exp: "سبعة ألوان: أحمر، برتقالي، أصفر، أخضر، أزرق، نيلي، بنفسجي." }
      ],
      physics: [ // فيزياء وكيمياء
        { q: "الطاقة الناتجة عن اهتزاز الأجسام هي طاقة:", opts: ["الكهرباء", "الصوت", "المغناطيس", "الضوء"], correct: 1, exp: "اهتزاز الأجسام ينتج موجات صوتية، فهي طاقة صوت." },
        { q: "ما وحدة قياس القوة؟", opts: ["الكيلو", "النيوتن", "الجرام", "الباسكال"], correct: 1, exp: "النيوتن هو وحدة القوة." },
        { q: "التعبير عن التغير الكيميائي بالحروف والأرقام يسمى:", opts: ["التعادل الكيميائي", "الرمز الكيميائي", "الخاصية الكيميائية", "المعادلة الكيميائية"], correct: 3, exp: "المعادلة الكيميائية تمثل التفاعل." },
        { q: "أسلاك الكهرباء تغطى بالمطاط لأنه:", opts: ["لا يوصل الكهرباء", "يوصل الكهرباء", "معدني", "مغناطيسي"], correct: 0, exp: "المطاط والبلاستيك عوازل." },
        { q: "قفز طالب من قارب يوضح قانون نيوتن:", opts: ["الأول", "الثاني", "الثالث", "الجذب"], correct: 2, exp: "لكل فعل رد فعل." },
        { q: "أي المواد التالية يذوب في الماء؟", opts: ["برادة الحديد", "نشارة خشب", "الرمل", "السكر"], correct: 3, exp: "السكر يذوب في الماء." },
        { q: "قانون الانعكاس: الضوء ينعكس", opts: ["بالزاوية نفسها", "بزاوية أكبر", "بزاوية أقل", "حسب اللون"], correct: 0, exp: "زاوية السقوط = زاوية الانعكاس." },
        { q: "لماذا يقل الوزن بالارتفاع؟", opts: ["الجاذبية تقل", "الاحتكاك", "الكتلة", "الرفع"], correct: 0, exp: "الجاذبية تتناقص بالبعد." },
        { q: "قانون نيوتن الثالث:", opts: ["الأول", "الثاني", "الثالث", "الجاذبية"], correct: 2, exp: "لكل فعل رد فعل." },
        { q: "وحدة شدة الصوت:", opts: ["هرتز", "ديسيبل", "نيوتن", "جول"], correct: 1, exp: "الديسيبل لشدة الصوت." },
        { q: "ما لون الضوء الذي ينكسر أكثر في المنشور؟", opts: ["الأحمر", "الأزرق", "البنفسجي", "الأصفر"], correct: 2, exp: "البنفسجي له أقصر طول موجي." },

    // دالة خلط (shuffle)
    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // متغيرات الحالة
    let currentQuestions = [];
    let student = { name: '', score: 0, answers: [] };
    let currentIndex = 0;
    let timerInterval;
    let timeLeft = 60;
    let canAnswer = true;
    let answered = false;

    // عناصر
    const startScreen = document.getElementById('startScreen');
    const quizScreen = document.getElementById('quizScreen');
    const endScreen = document.getElementById('endScreen');
    const reviewScreen = document.getElementById('reviewScreen');
    const nextBtn = document.getElementById('nextBtn');
    const questionCounter = document.getElementById('questionCounter');
    const timerDisplay = document.getElementById('timerDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const questionText = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const nameInput = document.getElementById('studentNameInput');
    const modal = document.getElementById('explainModal');
    const modalText = document.getElementById('modalExplainText');
    const closeModal = document.getElementById('closeModalBtn');

    function stopTimer() { if(timerInterval) clearInterval(timerInterval); }

    function startTimer() {
      timeLeft = 60; canAnswer = true; answered = false;
      timerDisplay.textContent = '٠١:٠٠';
      timerInterval = setInterval(() => {
        timeLeft--;
        let sec = timeLeft < 10 ? '٠'+timeLeft : timeLeft;
        timerDisplay.textContent = `٠٠:${sec}`;
        if(timeLeft <= 0 && canAnswer && !answered) {
          stopTimer();
          canAnswer = false; answered = true;
          student.answers[currentIndex] = -1;
          showAnswerFeedback(-1);
        }
      }, 1000);
    }

    function showAnswerFeedback(selectedIdx) {
      let q = currentQuestions[currentIndex];
      let correctIdx = q.correct;
      let allOptions = document.querySelectorAll('.option-btn');
      allOptions.forEach(btn => btn.classList.remove('correct', 'wrong'));
      allOptions[correctIdx].classList.add('correct');
      if(selectedIdx !== correctIdx) {
        if(selectedIdx !== -1) allOptions[selectedIdx].classList.add('wrong');
        modalText.innerText = q.exp;
        modal.style.display = 'flex';
      }
    }

    function loadQuestion(index) {
      stopTimer();
      startTimer();
      answered = false;
      let q = currentQuestions[index];
      questionCounter.textContent = `س ${index+1} / ${currentQuestions.length}`;
      questionText.textContent = q.q;
      optionsContainer.innerHTML = '';
      q.opts.forEach((opt, idx) => {
        let btn = document.createElement('div');
        btn.classList.add('option-btn');
        btn.textContent = opt;
        btn.dataset.opt = idx;
        btn.addEventListener('click', function handler(e) {
          if(!canAnswer || answered) return;
          stopTimer();
          canAnswer = false; answered = true;
          let selected = idx;
          student.answers[index] = selected;
          if(selected === q.correct) student.score += 1;
          scoreDisplay.textContent = `🏆 ${student.score} نقطة`;
          showAnswerFeedback(selected);
        });
        optionsContainer.appendChild(btn);
      });
    }

    function finishQuiz() { stopTimer(); displayEndScreen(); }

    function displayEndScreen() {
      quizScreen.style.display = 'none';
      endScreen.style.display = 'block';
      reviewScreen.style.display = 'none';
      let name = student.name || 'الطالب';
      let total = student.score;
      let percent = (total/currentQuestions.length)*100;
      let rank = percent>=90 ? 'ممتاز 🥇' : percent>=75 ? 'جيد جداً 🥈' : percent>=50 ? 'جيد 🥉' : 'تحتاج مراجعة 📘';
      document.getElementById('certificateArea').innerHTML = `<div class="certificate"><h2>📜 شهادة تقدير</h2><p style="font-size:1.6rem;">مدارس رياض الإبداع</p><h1 style="font-size:3rem;">${name}</h1><p>الصف: سادس  |  الدرجة: ${total} / ${currentQuestions.length}</p><div class="student-rank" style="background:gold; padding:8px 30px; border-radius:50px; display:inline-block;">${rank}</div><p style="margin:15px;">المعلم: هشام الشوني</p></div>`;
    }

    function buildReviewTable() {
      let html = '<tr><th>السؤال</th><th>إجابة الطالب</th><th>الصحيحة</th><th>شرح</th></tr>';
      currentQuestions.forEach((q, idx) => {
        let ans = student.answers[idx];
        let userTxt = (ans===null||ans===-1)?'لم يجب':q.opts[ans];
        let correctTxt = q.opts[q.correct];
        let rowClass = (ans===q.correct)?'correct-answer':'wrong-answer';
        html += `<tr class="${rowClass}"><td><strong>س${idx+1}:</strong> ${q.q}</td><td>${userTxt}</td><td>${correctTxt}</td><td>${q.exp||''}</td></tr>`;
      });
      document.getElementById('reviewTable').innerHTML = html;
    }

    function startTest(topicKey) {
      let sName = nameInput.value.trim();
      if(!sName) sName = 'طالب';
      student.name = sName;
      student.score = 0;
      // أخذ نسخة عشوائية من أسئلة التصنيف المختار
      currentQuestions = shuffleArray([...topics[topicKey]]);
      student.answers = new Array(currentQuestions.length).fill(null);
      currentIndex = 0;
      scoreDisplay.textContent = '🏆 0 نقطة';
      startScreen.style.display = 'none';
      quizScreen.style.display = 'block';
      endScreen.style.display = 'none';
      reviewScreen.style.display = 'none';
      loadQuestion(0);
    }

    // ربط الأزرار بالتصنيفات
    document.getElementById('topicEarthBtn').addEventListener('click', ()=> startTest('earth'));
    document.getElementById('topicPhysicsBtn').addEventListener('click', ()=> startTest('physics'));
    document.getElementById('topicBiologyBtn').addEventListener('click', ()=> startTest('biology'));
    document.getElementById('topicEnvBtn').addEventListener('click', ()=> startTest('environment'));

    nextBtn.addEventListener('click', ()=>{
      if(!answered && canAnswer) {
        stopTimer();
        answered = true; canAnswer = false;
        student.answers[currentIndex] = -1;
        showAnswerFeedback(-1);
      } else {
        if(currentIndex < currentQuestions.length - 1) {
          currentIndex++;
          loadQuestion(currentIndex);
        } else {
          finishQuiz();
        }
      }
    });

    closeModal.addEventListener('click', ()=>{
      modal.style.display = 'none';
    });

    document.getElementById('showReviewBtn').addEventListener('click', ()=>{ buildReviewTable(); endScreen.style.display='none'; reviewScreen.style.display='block'; });
    document.getElementById('backToEndBtn').addEventListener('click', ()=>{ reviewScreen.style.display='none'; endScreen.style.display='block'; });
    document.getElementById('restartBtn').addEventListener('click', ()=>{
      startScreen.style.display='block'; quizScreen.style.display='none'; endScreen.style.display='none'; reviewScreen.style.display='none'; stopTimer(); modal.style.display='none';
    });
  })();
</script>
</body>
